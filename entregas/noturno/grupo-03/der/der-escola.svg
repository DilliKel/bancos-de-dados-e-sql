    <rect x="340" y="800" width="280" height="162" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
    <rect x="340" y="800" width="280" height="32" fill="#e8f0fe" stroke="#374151" stroke-width="1.5"/>
