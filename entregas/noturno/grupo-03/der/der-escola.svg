<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 1260" font-family="Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="1260" fill="#ffffff"/>
  <text x="470" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">DER — Escola DB (Grupo 03)</text>

  <!-- ============ CONNECTORS (drawn first, under boxes) ============ -->
  <!-- turmas.id_curso -> cursos.id_curso -->
  <line x1="620" y1="320" x2="750" y2="176" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="255" fill="#6b6375" font-size="12">N</text>
  <text x="745" y="195" fill="#6b6375" font-size="12">1</text>

  <!-- turmas.id_professor -> professores.id_professor -->
  <line x1="340" y1="346" x2="190" y2="176" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="270" fill="#6b6375" font-size="12">N</text>
  <text x="185" y="195" fill="#6b6375" font-size="12">1</text>

  <!-- matriculas.id_aluno -> alunos.id_aluno -->
  <line x1="340" y1="846" x2="190" y2="722" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="800" fill="#6b6375" font-size="12">N</text>
  <text x="185" y="742" fill="#6b6375" font-size="12">1</text>

  <!-- matriculas.id_turma -> turmas.id_turma -->
  <line x1="480" y1="800" x2="480" y2="514" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="700" fill="#6b6375" font-size="12">N</text>
  <text x="490" y="530" fill="#6b6375" font-size="12">1</text>

  <!-- notas.id_matricula -> matriculas.id_matricula -->
  <line x1="480" y1="1040" x2="480" y2="962" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="1010" fill="#6b6375" font-size="12">N</text>
  <text x="490" y="978" fill="#6b6375" font-size="12">1</text>

  <!-- ============ TABLE: professores ============ -->
  <g>
    <rect x="60" y="40" width="260" height="136" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
    <rect x="60" y="40" width="260" height="32" fill="#e8f0fe" stroke="#374151" stroke-width="1.5"/>
