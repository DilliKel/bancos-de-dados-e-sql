  <!-- ============ TABLE: notas ============ -->
  <g>
    <rect x="340" y="1040" width="280" height="188" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
    <rect x="340" y="1040" width="280" height="32" fill="#e8f0fe" stroke="#374151" stroke-width="1.5"/>
    <text x="480" y="1061" text-anchor="middle" font-weight="700" fill="#111827">notas</text>
    <line x1="340" y1="1072" x2="620" y2="1072" stroke="#374151"/>
