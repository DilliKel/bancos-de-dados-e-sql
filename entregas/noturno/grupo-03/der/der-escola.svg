    <text x="356" y="850" font-weight="700" text-decoration="underline" fill="#111827">id_matricula</text><text x="580" y="850" fill="#6b6375" font-size="12">PK</text>
    <text x="356" y="876" fill="#111827">id_aluno</text><text x="580" y="876" fill="#8a5a00" font-size="12">FK</text>
    <text x="356" y="902" fill="#111827">id_turma</text><text x="580" y="902" fill="#8a5a00" font-size="12">FK</text>
    <text x="356" y="928" fill="#111827">data_matricula</text>
    <text x="356" y="954" fill="#111827">status</text>
