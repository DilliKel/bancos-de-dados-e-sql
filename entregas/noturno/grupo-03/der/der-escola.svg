    <line x1="60" y1="72" x2="320" y2="72" stroke="#374151"/>
    <text x="76" y="90" font-weight="700" text-decoration="underline" fill="#111827">id_professor</text><text x="240" y="90" fill="#6b6375" font-size="12">PK</text>
    <text x="76" y="116" fill="#111827">nome</text>
    <text x="76" y="142" fill="#111827">email</text>
    <text x="76" y="168" fill="#111827">area</text>
  </g>

