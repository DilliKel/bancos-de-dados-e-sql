    <text x="76" y="636" fill="#111827">nome</text>
    <text x="76" y="662" fill="#111827">email</text>
    <text x="76" y="688" fill="#111827">data_nascimento</text>
    <text x="76" y="714" fill="#111827">cidade</text>
