    <text x="356" y="1116" fill="#111827">id_matricula</text><text x="580" y="1116" fill="#8a5a00" font-size="12">FK</text>
    <text x="356" y="1142" fill="#111827">nota1</text>
    <text x="356" y="1168" fill="#111827">nota2</text>
    <text x="356" y="1194" fill="#111827">nota3</text>
    <text x="356" y="1220" fill="#111827">media</text>
